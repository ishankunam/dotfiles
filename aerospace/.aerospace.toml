# ------------------
# top-level settings
# ------------------
start-at-login = true # start AeroSpace at login
config-version = 2    # set config version

# set normalizations (below)
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# set default root container layout & orientation
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# omitted options
after-startup-command = []
automatically-unhide-macos-hidden-apps = false
persistent-workspaces = ['1']
on-mode-changed = []
accordion-padding = 0

# ----------------------------------
# set gaps between windows (inner-*)
# & between monitor edges  (outer-*)
# ----------------------------------
[gaps]
inner.vertical = 10
inner.horizontal = 10
outer.left = 10
outer.right = 10
outer.top = 0         # menu bar pads enough
outer.bottom = 10

# ---------------
# set key mapping
# ---------------
[key-mapping]
preset = 'qwerty'

# -------------------------
# set main control bindings
# -------------------------
[mode.main.binding]
# set key binding to focus a window (vim-style)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# set key binding to move a window (vim-style)
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# set key bindings to switch between workspaces
# alt-1 = 'workspace 1'
# alt-2 = 'workspace 2'
# alt-3 = 'workspace 3'
# alt-4 = 'workspace 4'
# alt-5 = 'workspace 5'
# alt-6 = 'workspace 6'
# alt-7 = 'workspace 7'
# alt-8 = 'workspace 8'
# alt-9 = 'workspace 9'
# alt-0 = 'workspace 10'

# set key binding to move a container to a workspace
# alt-shift-1 = 'move-node-to-workspace 1'
# alt-shift-2 = 'move-node-to-workspace 2'
# alt-shift-3 = 'move-node-to-workspace 3'
# alt-shift-4 = 'move-node-to-workspace 4'
# alt-shift-5 = 'move-node-to-workspace 5'
# alt-shift-6 = 'move-node-to-workspace 6'
# alt-shift-7 = 'move-node-to-workspace 7'
# alt-shift-8 = 'move-node-to-workspace 8'
# alt-shift-9 = 'move-node-to-workspace 9'
# alt-shift-0 = 'move-node-to-workspace 10'

# set key binding to control the layout
alt-v = 'layout tiles vertical'
alt-e = 'layout tiles horizontal'
alt-w = 'layout accordion'
alt-m = 'macos-native-fullscreen'
alt-f = 'layout floating tiling'  # toggle floating

# set key bindings to control workspace navigation
# alt-tab = 'workspace-back-and-forth'
alt-tab = 'move-node-to-monitor --focus-follows-window --wrap-around next'

# set keybind to resize a window
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# set keybind to kill a window
alt-shift-q = 'close'

# set binding to enter service mode (for additional commands)
alt-shift-semicolon = 'mode service'

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut
# (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# -------------------------
# set main service bindings
# -------------------------
[mode.service.binding]
esc = ['reload-config', 'mode main'] # exit service mode
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = [
    'layout floating tiling',
    'mode main',
] # toggle between floating and tiling layout

# close all windows but current
backspace = ['close-all-windows-but-current', 'mode main']

# set bindings for joining windows
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# --------------------------------------
# hardcode the "awkward" tilers to float
# --------------------------------------
# hardcode system settings
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

# hardcode imessage
[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = 'layout floating'

# hardcode iphone simulator
[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = 'layout floating'
